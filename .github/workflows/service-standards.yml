name: Service Standards Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  service-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Hydrate shared workspace SDK dependencies
        shell: bash
        run: |
          set -euo pipefail
          deps_root="$(cd "$GITHUB_WORKSPACE/../.." && pwd)"
          source_root="$deps_root/spring-ai-plus2-source"
          rm -rf "$source_root" "$deps_root/spring-ai-plus-app-api" "$deps_root/sdk"
          git clone --depth 1 https://gitee.com/zowalk/spring-ai-plus2.git "$source_root"
          mkdir -p "$deps_root/spring-ai-plus-app-api" "$deps_root/sdk"
          cp -R "$source_root/spring-ai-plus-business/spring-ai-plus-app-api/." "$deps_root/spring-ai-plus-app-api/"
          cp -R "$source_root/spring-ai-plus-business/sdk/." "$deps_root/sdk/"
          rm -rf "$source_root"

      - name: Detect policy file changes
        if: github.event_name == 'pull_request'
        id: policy_change
        run: |
          git fetch --no-tags --prune origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qx "docs/plans/service-encapsulation-policy.json"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Require policy review labels for policy changes
        if: github.event_name == 'pull_request' && steps.policy_change.outputs.changed == 'true'
        env:
          POLICY_BASE_FILE: /tmp/base-service-encapsulation-policy.json
          POLICY_PR_LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if git cat-file -e "origin/${{ github.base_ref }}:docs/plans/service-encapsulation-policy.json" 2>/dev/null; then
            git show "origin/${{ github.base_ref }}:docs/plans/service-encapsulation-policy.json" > "$POLICY_BASE_FILE"
          else
            echo "{}" > "$POLICY_BASE_FILE"
          fi
          node scripts/check-service-policy-review-gate.mjs

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate service encapsulation policy
        run: pnpm run audit:services:policy

      - name: Run service standards audit
        run: pnpm run audit:services

      - name: Run build gate
        run: pnpm run build

      - name: Upload service audit reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: service-encapsulation-audit
          path: |
            docs/reports/*-service-encapsulation-audit.md
            docs/reports/*-service-encapsulation-audit.json
          if-no-files-found: warn
          retention-days: 14
