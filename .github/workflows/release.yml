name: Release Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x64
            platform: ubuntu-22.04
            rust_targets: ''
            args: --config src-tauri/tauri.prod.conf.json --bundles appimage,deb
          - name: Windows x64
            platform: windows-latest
            rust_targets: ''
            args: --config src-tauri/tauri.prod.conf.json --bundles nsis
          - name: macOS Apple Silicon
            platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --config src-tauri/tauri.prod.conf.json --target aarch64-apple-darwin --bundles app,dmg
          - name: macOS Intel
            platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --config src-tauri/tauri.prod.conf.json --target x86_64-apple-darwin --bundles app,dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Hydrate shared workspace SDK dependencies
        shell: bash
        run: |
          set -euo pipefail
          deps_root="$(cd "$GITHUB_WORKSPACE/../.." && pwd)"
          source_root="$deps_root/spring-ai-plus2-source"
          rm -rf "$source_root" "$deps_root/spring-ai-plus-app-api" "$deps_root/sdk"
          git clone --depth 1 --filter=blob:none --sparse https://gitee.com/zowalk/spring-ai-plus2.git "$source_root"
          git -C "$source_root" sparse-checkout set spring-ai-plus-business/spring-ai-plus-app-api spring-ai-plus-business/sdk
          mkdir -p "$deps_root/spring-ai-plus-app-api" "$deps_root/sdk"
          cp -R "$source_root/spring-ai-plus-business/spring-ai-plus-app-api/." "$deps_root/spring-ai-plus-app-api/"
          cp -R "$source_root/spring-ai-plus-business/sdk/." "$deps_root/sdk/"
          rm -rf "$source_root"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with macOS targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: pnpm exec tauri
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'v__VERSION__' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Magic Studio {0}', github.ref_name) || 'Magic Studio v__VERSION__' }}
          releaseBody: |
            Desktop installers built automatically by GitHub Actions.
            Download the package for Windows, Ubuntu, or macOS from the assets below.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: false
          assetNamePattern: magic-studio_[version]_[platform]_[arch][_setup][ext]
          args: ${{ matrix.args }}
