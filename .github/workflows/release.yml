name: Release Desktop App

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and publish
        required: true
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}

    steps:
      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ env.RELEASE_TAG }}"
          $title = "Magic Studio $tag"
          $notesFile = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @"
          Desktop installers built automatically by GitHub Actions.
          Download the package for Windows, Ubuntu, or macOS from the assets below.
          "@ | Out-File -FilePath $notesFile -Encoding utf8

          & gh release view $tag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            & gh release edit $tag --repo "${{ github.repository }}" --title $title --notes-file $notesFile
          } else {
            & gh release create $tag --repo "${{ github.repository }}" --title $title --notes-file $notesFile
          }

  publish-tauri:
    name: ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.platform }}
    env:
      MAGIC_STUDIO_SDK_MODE: npm
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu x64
            platform: ubuntu-22.04
            args: --config src-tauri/tauri.prod.conf.json --bundles appimage,deb
            asset_patterns: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - name: Windows x64
            platform: windows-latest
            args: --config src-tauri/tauri.prod.conf.json --bundles nsis
            asset_patterns: |
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS
            platform: macos-latest
            args: --config src-tauri/tauri.prod.conf.json --bundles dmg
            asset_patterns: |
              src-tauri/target/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_type == 'tag' && github.ref || format('refs/tags/{0}', github.event.inputs.tag) }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundles
        run: pnpm exec tauri build ${{ matrix.args }}

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_PATTERNS: ${{ matrix.asset_patterns }}
        run: |
          $patterns = $env:ASSET_PATTERNS -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $files = New-Object System.Collections.Generic.List[string]

          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | ForEach-Object {
              $files.Add($_.FullName)
            }
          }

          if ($files.Count -eq 0) {
            throw "No release assets matched patterns:`n$env:ASSET_PATTERNS"
          }

          & gh release upload $env:RELEASE_TAG @files --repo "${{ github.repository }}" --clobber
