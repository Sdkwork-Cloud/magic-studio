[package]
name = "sdkwork-ai-sdk"
version = "0.1.0"
edition = "2021"

[lib]
name = "sdkwork_ai_sdk"
path = "src/lib.rs"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
