    <style>
      :root {
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --font-serif: 'Merriweather', serif;
      }

      /* Custom scrollbar for Webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }

      /* Utility to hide scrollbar while allowing scrolling */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      /* --- TipTap / ProseMirror Notion-like Styles --- */
      .ProseMirror {
        outline: none;
        min-height: 100%;
        padding-bottom: 30vh;
        font-family: var(--font-sans);
        color: #37352f;
      }
      .dark .ProseMirror {
        color: #d4d4d4;
      }
      
      /* Placeholder */
      .ProseMirror p.is-editor-empty:first-child::before {
        content: attr(data-placeholder);
        float: left;
        color: #9ca3af;
        pointer-events: none;
        height: 0;
        font-style: normal;
      }
      
      /* Typography */
      .ProseMirror h1 { 
        font-size: 2.25em; 
        font-weight: 700; 
        line-height: 1.2; 
        margin-top: 1.5em; 
        margin-bottom: 0.25em; 
        letter-spacing: -0.02em;
      }
      .ProseMirror h2 { 
        font-size: 1.75em; 
        font-weight: 600; 
        line-height: 1.3; 
        margin-top: 1.4em; 
        margin-bottom: 0.25em; 
        letter-spacing: -0.01em;
      }
      .ProseMirror h3 { 
        font-size: 1.25em; 
        font-weight: 600; 
        line-height: 1.4; 
        margin-top: 1.2em; 
        margin-bottom: 0.2em; 
      }
      
      .ProseMirror p { 
        margin-bottom: 0.5em; 
        line-height: 1.75; 
        font-size: 16px;
      }
      
      .ProseMirror ul, .ProseMirror ol { 
        padding-left: 1.5em; 
        margin-bottom: 0.5em; 
      }
      
      .ProseMirror blockquote { 
        border-left: 3px solid #e5e7eb; 
        padding-left: 1rem; 
        margin: 1rem 0; 
        font-style: normal;
        font-size: 1.1em;
        color: #4b5563;
      }
      .dark .ProseMirror blockquote {
        border-color: #3f3f46;
        color: #9ca3af;
      }
      
      .ProseMirror pre { 
        background: #f3f4f6; 
        padding: 0.75rem 1rem; 
        border-radius: 0.375rem; 
        color: #1f2937; 
        font-family: var(--font-mono); 
        overflow-x: auto; 
        margin: 0.75rem 0;
      }
      .dark .ProseMirror pre {
        background: #27272a;
        color: #e5e7eb;
      }

      .ProseMirror code { 
        font-family: var(--font-mono); 
        background: #f3f4f6; 
        color: #ef4444; 
        padding: 0.1em 0.3em; 
        border-radius: 0.25em; 
        font-size: 0.85em; 
      }
      .dark .ProseMirror code {
        background: #3f3f46;
        color: #f87171;
      }

      /* Gapcursor styles */
      .ProseMirror-gapcursor {
        display: none;
        pointer-events: none;
        position: absolute;
      }

      .ProseMirror-gapcursor:after {
        content: "";
        display: block;
        position: absolute;
        top: -2px;
        width: 20px;
        border-top: 1px solid black;
        animation: ProseMirror-cursor-blink 1.1s steps(2, start) infinite;
      }

      .dark .ProseMirror-gapcursor:after {
        border-top-color: white;
      }

      @keyframes ProseMirror-cursor-blink {
        to {
          visibility: hidden;
        }
      }
      
      /* Task Lists */
      ul[data-type="taskList"] { list-style: none; padding: 0; }
      ul[data-type="taskList"] li { display: flex; align-items: flex-start; margin-bottom: 0.25em; }
      ul[data-type="taskList"] li > label { margin-right: 0.5em; user-select: none; margin-top: 0.2em; }
      ul[data-type="taskList"] li > div { flex: 1; }

      /* Ensure full height */
      html, body, #root {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: #000;
        color: #fff;
      }
    </style>
