  <rect width="160" height="160" fill="#0b1220"/>
  <rect width="160" height="160" filter="url(#grain-noise)" opacity="0.18"/>
  <g fill="#93c5fd" fill-opacity="0.08">
    <circle cx="24" cy="24" r="1.2"/>
    <circle cx="112" cy="38" r="1"/>
    <circle cx="72" cy="98" r="1.1"/>
    <circle cx="136" cy="126" r="1.4"/>
    <circle cx="44" cy="132" r="1"/>
  </g>
</svg>
