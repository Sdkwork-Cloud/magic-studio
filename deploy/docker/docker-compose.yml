version: '3.9'
services:
  magic-studio-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      MAGIC_STUDIO_SERVER_HOST: ${MAGIC_STUDIO_SERVER_HOST:-0.0.0.0}
      MAGIC_STUDIO_SERVER_PORT: ${MAGIC_STUDIO_SERVER_PORT:-4318}
      MAGIC_STUDIO_SERVER_RUNTIME_MODE: ${MAGIC_STUDIO_SERVER_RUNTIME_MODE:-server}
      MAGIC_STUDIO_SERVER_DATA_ROOT: ${MAGIC_STUDIO_SERVER_DATA_ROOT:-/var/lib/magic-studio}
      MAGIC_STUDIO_USER_CENTER_MODE: ${MAGIC_STUDIO_USER_CENTER_MODE:-builtin-local}
      MAGIC_STUDIO_USER_CENTER_PROVIDER_KEY: ${MAGIC_STUDIO_USER_CENTER_PROVIDER_KEY:-magic-studio-local}
      MAGIC_STUDIO_USER_CENTER_APP_ID: ${MAGIC_STUDIO_USER_CENTER_APP_ID:-magic-studio-v2}
      MAGIC_STUDIO_USER_CENTER_LOCAL_API_BASE_PATH: ${MAGIC_STUDIO_USER_CENTER_LOCAL_API_BASE_PATH:-/api/app/v1/user-center}
      MAGIC_STUDIO_USER_CENTER_SQLITE_PATH: ${MAGIC_STUDIO_USER_CENTER_SQLITE_PATH:-/var/lib/magic-studio/user-center.db}
      MAGIC_STUDIO_USER_CENTER_DATABASE_URL: ${MAGIC_STUDIO_USER_CENTER_DATABASE_URL:-}
      MAGIC_STUDIO_USER_CENTER_SCHEMA_NAME: ${MAGIC_STUDIO_USER_CENTER_SCHEMA_NAME:-}
      MAGIC_STUDIO_USER_CENTER_TABLE_PREFIX: ${MAGIC_STUDIO_USER_CENTER_TABLE_PREFIX:-ms_uc_}
      MAGIC_STUDIO_USER_CENTER_APP_API_BASE_URL: ${MAGIC_STUDIO_USER_CENTER_APP_API_BASE_URL:-}
      MAGIC_STUDIO_USER_CENTER_EXTERNAL_BASE_URL: ${MAGIC_STUDIO_USER_CENTER_EXTERNAL_BASE_URL:-}
      MAGIC_STUDIO_USER_CENTER_SECRET_ID: ${MAGIC_STUDIO_USER_CENTER_SECRET_ID:-}
      MAGIC_STUDIO_USER_CENTER_SHARED_SECRET: ${MAGIC_STUDIO_USER_CENTER_SHARED_SECRET:-}
      MAGIC_STUDIO_USER_CENTER_AUTHORIZATION_HEADER_NAME: ${MAGIC_STUDIO_USER_CENTER_AUTHORIZATION_HEADER_NAME:-Authorization}
      MAGIC_STUDIO_USER_CENTER_ACCESS_TOKEN_HEADER_NAME: ${MAGIC_STUDIO_USER_CENTER_ACCESS_TOKEN_HEADER_NAME:-Access-Token}
      MAGIC_STUDIO_USER_CENTER_REFRESH_TOKEN_HEADER_NAME: ${MAGIC_STUDIO_USER_CENTER_REFRESH_TOKEN_HEADER_NAME:-Refresh-Token}
      MAGIC_STUDIO_USER_CENTER_SESSION_HEADER_NAME: ${MAGIC_STUDIO_USER_CENTER_SESSION_HEADER_NAME:-x-sdkwork-user-center-session-id}
      MAGIC_STUDIO_USER_CENTER_AUTHORIZATION_SCHEME: ${MAGIC_STUDIO_USER_CENTER_AUTHORIZATION_SCHEME:-Bearer}
      MAGIC_STUDIO_USER_CENTER_ALLOW_AUTHORIZATION_FALLBACK_TO_ACCESS_TOKEN: ${MAGIC_STUDIO_USER_CENTER_ALLOW_AUTHORIZATION_FALLBACK_TO_ACCESS_TOKEN:-true}
      MAGIC_STUDIO_USER_CENTER_HANDSHAKE_FRESHNESS_WINDOW_MS: ${MAGIC_STUDIO_USER_CENTER_HANDSHAKE_FRESHNESS_WINDOW_MS:-30000}
    ports:
      - '4318:4318'
    volumes:
      - magic-studio-data:/var/lib/magic-studio

volumes:
  magic-studio-data:
