
# HTTPS 配置
server {
    listen       443 ssl;
    server_name  manager.sdkwork.com ~^(manager[a-zA-Z0-9_-]+).sdkwork.com$;

    ssl_certificate /opt/certs/letsencrypt/live/sdkwork.com/fullchain.pem;
    ssl_certificate_key /opt/certs/letsencrypt/live/sdkwork.com/privkey.pem;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.1 TLSv1;
    ssl_ciphers ALL:!ADH:!EXPORT56:RC4+RSA:+HIGH:+MEDIUM:+LOW:+SSLv2:+EXP;
    ssl_prefer_server_ciphers on;
    
    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_comp_level 2;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png application/wasm;
    gzip_vary off;
    gzip_disable "MSIE [1-6].";

    # 设置默认的环境变量 'env' 为 'prod'
    set $is_mobile 0;
    set $env prod;
    # 匹配不同的域名格式
    if ($host ~* "^([a-zA-Z0-9_-]+)-(dev|test|beta|pre|prod)([0-9]*).([a-zA-Z0-9.-]+)$") {
        set $env $2;  # 提取 dev/test/beta
        set $domain $4;  # 提取 sdkwork.com 或其他动态域名部分
    }   

    # 根据 User-Agent 判断是否为移动端
    if ( $http_user_agent ~ "(MIDP)|(WAP)|(UP.Browser)|(Smartphone)|(Obigo)|(Mobile)|(AU.Browser)|(wxd.Mms)|(WxdB.Browser)|(CLDC)|(UP.Link)|(KM.Browser)|(UCWEB)|(SEMC-Browser)|(Mini)|(Symbian)|(Palm)|(Nokia)|(Panasonic)|(MOT-)|(SonyEricsson)|(NEC-)|(Alcatel)|(Ericsson)|(BENQ)|(BenQ)|(Amoisonic)|(Amoi-)|(Capitel)|(PHILIPS)|(SAMSUNG)|(Lenovo)|(Mitsu)|(Motorola)|(SHARP)|(WAPPER)|(LG-)|(LG/)|(EG900)|(CECT)|(Compal)|(kejian)|(Bird)|(BIRD)|(G900/V1.0)|(Arima)|(CTL)|(TDG)|(Daxian)|(DAXIAN)|(DBTEL)|(Eastcom)|(EASTCOM)|(PANTECH)|(Dopod)|(Haier)|(HAIER)|(KONKA)|(KEJIAN)|(LENOVO)|(Soutec)|(SOUTEC)|(SAGEM)|(SEC-)|(SED-)|(EMOL-)|(INNO55)|(ZTE)|(iPhone)|(Android)|(Windows CE)|(Wget)|(Java)|(curl)|(Opera)"){
      set $is_mobile 1;
    }
    set $mobile_path /opt/vuesource/sdkwork-app-manager-uni/dist/h5;
    set $pc_path /opt/vuesource/sdkwork-app-manager-web/dist;
    set $root_path $pc_path/$env;
    # 设置默认的环境变量 'env' 为 'prod'
    set $project console;
    # 根据设备类型和环境设置根路径 
    if ( $is_mobile ) {
      set $root_path $mobile_path/$env/$project;
    } 
    error_page  505 500 502 503 504 404 /index.html; 

    location = /index.html {
        add_header Cache-Control "no-cache, no-store";
        root $root_path;
    }


    # 处理 .txt 文件请求
    location ~ ^/([a-zA-Z0-9_-]+).txt$ {
      # 提取文件名和主机名
      set $filename $1.txt;        # 从请求的 URL 提取文件名（例如 testxxxx）
      set $host_name $host;     # 获取请求的主机名（例如 mp.sdkwork.com）
 
      # 构建请求的完整 URL
      set $proxy_url http://api_servers_${env}/dns_verify_record/verify?filename=$filename&host=$host_name;

      # 转发到对应的后端服务器池，并传递文件名和主机名作为查询参数
      proxy_pass $proxy_url;

      # 传递请求头信息给后端服务
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # 设置超时时间
      proxy_connect_timeout 10s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
    } 

    location ~* ^.+.(html|avi|mp3|css|js|txt|xml|swf|wav|png|gif|jpg|jpeg|eot|otf|ttf|woff|woff2|eot|svg)$ {
        root $root_path;
    }

    location / {
        root $root_path;
        try_files $uri $uri/ /index.html =404;
    }
}

