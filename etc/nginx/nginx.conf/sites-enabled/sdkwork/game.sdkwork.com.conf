# ========================================
# 象棋游戏前端Nginx配置
# 域名: game.sdkwork.com
# HTML集成Vue架构 + 移动端支持
# 生成时间: 2025-09-07T11:37:44.058811
# ========================================

# HTTP配置 - 重定向到HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name game.sdkwork.com ~^(game[a-zA-Z0-9_-]+).sdkwork.com$;
    
    # 强制重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS配置 - 主服务
server {
    # SSL基本配置
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name game.sdkwork.com ~^(game[a-zA-Z0-9_-]+).sdkwork.com$;
    
    # 项目路径变量定义
    set $root_path /opt/aisource/ai-generate-app/fronts/html/chess/dist;
    
    # SSL证书配置
    ssl_certificate /opt/certs/letsencrypt/live/sdkwork.com/fullchain.pem;
    ssl_certificate_key /opt/certs/letsencrypt/live/sdkwork.com/privkey.pem;
    
    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # 文档根目录
    root $root_path;
    index index.html index.mobile.html;
    
    # 日志配置
    access_log /var/log/nginx/game.sdkwork.com_access.log;
    error_log /var/log/nginx/game.sdkwork.com_error.log;
    
    # 基本安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Gzip压缩配置
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;
    
    # 静态文件缓存配置
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        gzip_static on;
    }
    
    # HTML文件缓存配置（支持移动端优先）
    location ~* \.(html|shtml|shtm)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Vary "Accept-Encoding";
        gzip_static on;
    }
    set $mobile_request 0;
    # 优先检查URL参数：device=mobile 
    if ($arg_device = "mobile") {
          set $mobile_request 1;
    }

    # 根目录特殊处理
    location = / {
        
        if ($mobile_request = 1) {
            rewrite ^ /pages/index.mobile.html last;
        }
        rewrite ^ /pages/index.html last;
    }
    
    # 根目录HTML文件访问重定向
    location ~ ^/([^/]+\.(html|shtml|shtm))$ {
        
        if ($mobile_request = 1) {
            rewrite ^/([^/]+)\.html$ /pages/$1.mobile.html last;
        }
        rewrite ^/(.*)$ /pages/$1 last;
    }
    
    # 页面目录直接访问
    location /pages/ {
        try_files $uri $uri/ =404;
    }
    
    # 其他资源直接访问
    location / {
        try_files $uri $uri/ =404;
    }
    

    # API代理配置
    location /api/ {
        proxy_pass http://127.0.0.1:3443;  # 请修改为您的API服务器地址
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
    
    # WebSocket支持
    location /ws/ {
        proxy_pass http://127.0.0.1:3444;  # 请修改为您的WebSocket服务器地址
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
    
    # 特殊文件访问控制
    location ~ /\. {
        deny all;
    }
    
    location ~ \.(env|log|bak|tmp)$ {
        deny all;
    }
    
    # 构建信息文件保护
    location ~ /(build-info|build-report|file-hashes)\.json$ {
        deny all;
    }
    
    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        internal;
    }
    
    location = /50x.html {
        internal;
    }
}
