
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
} 
server {
       listen       443 ssl;
       server_name  proxy.noaper.com ~^(proxy[a-zA-Z0-9_-]+).noaper.com$;
       ssl_certificate /opt/certs/letsencrypt/live/noaper.com/fullchain.pem;
       ssl_certificate_key /opt/certs/letsencrypt/live/noaper.com/privkey.pem;
       ssl_session_timeout 5m;
       ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
       ssl_ciphers ALL:!ADH:!EXPORT56:RC4+RSA:+HIGH:+MEDIUM:+LOW:+SSLv2:+EXP;
       ssl_prefer_server_ciphers on; 
       set $env prod;
       # 匹配不同的域名格式
       if ($host ~* "^([a-zA-Z0-9_-]+)-(dev|test|beta|pre|prod)([0-9]*).([a-zA-Z0-9.-]+)$") {
        set $env $2;  # 提取 dev/test/beta
        set $domain $4;  # 提取 noaper.com 或其他动态域名部分

       } 
        # 处理 .txt 文件请求
       location ~ ^/([a-zA-Z0-9_-]+).txt$ {
          # 提取文件名和主机名
          set $filename $1.txt;        # 从请求的 URL 提取文件名（例如 testxxxx）
          set $host_name $host;     # 获取请求的主机名（例如 mp.noaper.com）
 
          # 构建请求的完整 URL
          set $proxy_url http://api_servers_${env}/dns_verify_record/verify?filename=$filename&host=$host_name;

          # 转发到对应的后端服务器池，并传递文件名和主机名作为查询参数
          proxy_pass $proxy_url;

          # 传递请求头信息给后端服务
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

          # 设置超时时间
          proxy_connect_timeout 10s;
          proxy_send_timeout 10s;
          proxy_read_timeout 10s;
        }            
       location / {
            proxy_set_header Host $host;
            proxy_redirect off;
            proxy_set_header REMOTE-HOST $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header From $host;
            proxy_set_header Cookie $http_cookie;
            proxy_cookie_path ~*^/.* /;
            #index index.html;
             # websocket连接有效时间，在该时间内没有数据交互的话websocket连接会自动断开

            proxy_http_version 1.1;
            # websocket连接的Upgrade必须设置为WebSocket，表示在取得服务器响应之后，使用HTTP升级将HTTP协议转换(升级)为WebSocket协议
            proxy_set_header Upgrade $http_upgrade;
            # websocket 的Connection必须设置为Upgrade，表示客户端希望连接升级
            proxy_set_header Connection "Upgrade";
            proxy_pass  http://proxy_servers_${env}/;
            client_max_body_size 200m;
            proxy_read_timeout 1200s;
            proxy_connect_timeout 6000s;  # 单位为秒，这里设置为 60 秒
            proxy_send_timeout 1200s;
            keepalive_timeout 3600s;
            keepalive_requests 1000;
            #index index.html;
        }

        location ~ /.well-known {
                allow all;
        }

}
server {
       listen       80;
       server_name  proxy.noaper.com ~^(proxy[a-zA-Z0-9_-]+).noaper.com$; 
       set $env prod;
       # 匹配不同的域名格式
       if ($host ~* "^([a-zA-Z0-9_-]+)-(dev|test|beta|pre|prod)([0-9]*).([a-zA-Z0-9.-]+)$") {
        set $env $2;  # 提取 dev/test/beta
        set $domain $4;  # 提取 noaper.com 或其他动态域名部分
       }
 
       location ~* ^.+.(mp4|avi|mkv|mov|wmv|flv|webm|mpeg|mpg|3gp|3g2|ogv|vob|mts|m2ts|f4v|rmvb|ts|mp3|css|js|txt|xml|swf|wav|png|gif|jpg|jpeg|eot|otf|ttf|woff|woff2|eot|svg)$ {
           root   /opt/resources/;
        }
