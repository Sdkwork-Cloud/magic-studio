upstream nacos-cluster {
        # Nacos 集群节点
        server 127.0.0.1:8848;
}
server {
    listen       443 ssl;
    server_name  nacos.noaper.com ~^(nacos[a-zA-Z0-9]+|nacos_[a-zA-Z]+).noaper.com$;
    #ssl on;
    ssl_certificate /opt/certs/letsencrypt/live/noaper.com/fullchain.pem;
    ssl_certificate_key /opt/certs/letsencrypt/live/noaper.com/privkey.pem;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers ALL:!ADH:!EXPORT56:RC4+RSA:+HIGH:+MEDIUM:+LOW:+SSLv2:+EXP;
    ssl_prefer_server_ciphers on;
    #charset koi8-r;
    error_page  505 500 502 503 504 404          /index.html;
    #access_log  logs/host.access.log  main;
    location /nacos/ {
        #root   html;
        #index  index.html index.htm;
        proxy_pass http://nacos-cluster/nacos/; # 代理到 Nacos 集群
        proxy_set_header Host $host;
        #proxy_set_header Host $host

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location / {
        #root   html;
        #index  index.html index.htm;
        proxy_pass http://127.0.0.1:8848/nacos/; # 代理到 Nacos 集群
        proxy_set_header Host $host;
        #proxy_set_header Host $host

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen       80;
    server_name  nacos.noaper.com  ~^(nacos[a-zA-Z0-9]+|nacos_[a-zA-Z]+).noaper.com$;
    rewrite ^(.*)$ https://${server_name}$1 permanent;
}